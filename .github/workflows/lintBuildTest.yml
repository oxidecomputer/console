name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  install:
    timeout-minutes: 60
    runs-on: macos-15-xlarge
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: node_modules
          key: modules-${{ hashFiles('package-lock.json', 'patches/**') }}
      - name: npm install
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm install
  ci:
    timeout-minutes: 5
    runs-on: macos-15-xlarge
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Get node_modules from cache
        uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: node_modules
          key: modules-${{ hashFiles('package-lock.json', 'patches/**') }}
      - name: Typecheck
        run: npm run tsc
      - name: Lint
        run: npm run lint
      - name: Check formatting
        run: npm run fmt:check
      - name: Test
        run: npm test run -- --project unit
      - name: Build
        run: npm run build
  playwright:
    name: Playwright (${{ matrix.playwright }})
    timeout-minutes: 20
    runs-on: macos-15-xlarge
    needs: install
    strategy:
      fail-fast: false
      matrix:
        include:
          - playwright: chrome
            vitest: chromium
          - playwright: firefox
            vitest: firefox
          - playwright: safari
            vitest: webkit
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Get node_modules from cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: modules-${{ hashFiles('package-lock.json', 'patches/**') }}
      - name: Set env.PLAYWRIGHT_VERSION
        run: |
          PLAYWRIGHT_VERSION=$(npm ls --json @playwright/test | jq --raw-output '.dependencies["@playwright/test"].version')
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> $GITHUB_ENV
      # Cache browser binaries, cache key is based on Playwright version and OS
      - name: Cache Playwright browser binaries
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: '~/.cache/ms-playwright'
          key: '${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}'
          restore-keys: |
            ${{ runner.os }}-playwright-
      # Install browser binaries & OS dependencies if cache missed
      - name: Install Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
      # Install only the OS dependencies if cache hit
      - name: 🏗 Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps
      - name: Run Vitest browser tests
        run: npm run test:browser -- run --browser.name=${{ matrix.vitest }}
      - name: Run Playwright browser tests
        run: npx playwright test --project=${{ matrix.playwright }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.playwright }}
          path: test-results/
          retention-days: 7
